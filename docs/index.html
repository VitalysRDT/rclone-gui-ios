<style>
  :root{
    --accent:#7C3AED; --accent-deep:#5B21B6; --accent-soft:rgba(124,58,237,.12);
    --ink:#0B0820; --muted:#6B6580; --line:rgba(11,8,32,.10);
    --bg:#FBFAFF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px}
  /* nav */
  header.nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(180%) blur(20px);
    background:rgba(251,250,255,.78);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;gap:14px;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
  .brand img{width:30px;height:30px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .nav-sp{flex:1}
  .nav a.ghost,.lang button{font-size:14px;font-weight:600;color:var(--muted)}
  .lang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
  .lang button{border:none;background:transparent;padding:6px 12px;cursor:pointer}
  .lang button.on{background:var(--accent);color:#fff}
  /* hero */
  .hero{position:relative;overflow:hidden;text-align:center;padding:64px 0 28px}
  .hero::before{content:"";position:absolute;inset:-20% -10% auto -10%;height:520px;z-index:0;
    background:radial-gradient(60% 80% at 50% 0%, rgba(124,58,237,.20), transparent 70%)}
  .hero>*{position:relative;z-index:1}
  .hero .icon{width:108px;height:108px;border-radius:25px;box-shadow:0 18px 50px rgba(124,58,237,.35);}
  .pill{display:inline-flex;align-items:center;gap:8px;margin-top:22px;padding:7px 15px;border-radius:999px;
    background:#fff;border:1px solid var(--accent);color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.3px;
    box-shadow:0 6px 20px rgba(124,58,237,.18)}
  h1.title{font-size:clamp(40px,7vw,72px);font-weight:800;letter-spacing:-2px;line-height:1.02;margin:18px 0 0}
  .hero p.sub{font-size:clamp(17px,2.4vw,21px);color:var(--muted);max-width:620px;margin:18px auto 0;font-weight:500}
  .cta-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:30px}
  .btn{display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;font-weight:700;
    border-radius:15px;padding:14px 22px;font-size:16px;transition:transform .12s ease, box-shadow .12s ease}
  .btn:active{transform:translateY(1px)}
  .btn-violet{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;
    box-shadow:0 12px 28px rgba(124,58,237,.40)}
  .btn-violet:hover{box-shadow:0 16px 36px rgba(124,58,237,.5)}
  .appstore{display:inline-flex;align-items:center;gap:11px;background:#000;color:#fff;border-radius:15px;
    padding:11px 20px;box-shadow:0 10px 26px rgba(0,0,0,.22)}
  .appstore svg{width:26px;height:26px}
  .appstore .l1{font-size:11px;opacity:.85;line-height:1;margin-bottom:2px}
  .appstore .l2{font-size:19px;font-weight:600;line-height:1}
  .trust{margin-top:20px;color:var(--muted);font-size:13.5px;font-weight:600;
    display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
  .trust span{display:inline-flex;align-items:center;gap:6px}
  .trust b{color:var(--accent)}
  /* gallery */
  section{padding:54px 0}
  .eyebrow{color:var(--accent);font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;text-align:center}
  h2.sec{font-size:clamp(28px,4.4vw,40px);font-weight:800;letter-spacing:-1px;text-align:center;margin:8px 0 0}
  .sec-sub{text-align:center;color:var(--muted);max-width:560px;margin:12px auto 0;font-weight:500}
  .gallery{display:flex;gap:20px;overflow-x:auto;scroll-snap-type:x mandatory;
    padding:34px 22px 14px;margin:0 -22px;-webkit-overflow-scrolling:touch}
  .gallery::-webkit-scrollbar{height:0}
  .panel{scroll-snap-align:center;flex:0 0 auto;width:320px;border-radius:30px;overflow:hidden;
    position:relative;padding:30px 22px 0;display:flex;flex-direction:column;align-items:center;
    box-shadow:0 20px 50px rgba(11,8,32,.12)}
  .panel .kick{font-size:11px;font-weight:800;letter-spacing:.8px;opacity:.8}
  .panel h3{font-size:25px;font-weight:800;letter-spacing:-.6px;line-height:1.06;margin:8px 0 0;text-align:center}
  .panel .psub{font-size:13.5px;font-weight:500;margin:9px 0 0;text-align:center;opacity:.72;min-height:38px}
  .panel .stage{margin-top:18px;margin-bottom:-40px}
  /* phone */
  .phone{background:#0b0820;border-radius:42px;padding:7px;position:relative;
    box-shadow:0 26px 50px rgba(11,8,32,.28), inset 0 0 0 2px rgba(255,255,255,.07)}
  .phone-screen{border-radius:36px;overflow:hidden;background:#fff;position:relative}
  .phone-island{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:88px;height:19px;background:#000;border-radius:12px;z-index:8}
  /* features */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:24px;
    box-shadow:0 8px 26px rgba(11,8,32,.05)}
  .card .ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#fff}
  .card h4{font-size:18px;font-weight:700;margin:16px 0 0;letter-spacing:-.3px}
  .card p{color:var(--muted);font-size:14.5px;margin:7px 0 0;font-weight:500}
  /* free month */
  .free{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-deep) 100%);color:#fff;
    border-radius:32px;padding:48px 30px;text-align:center;position:relative;overflow:hidden;
    box-shadow:0 30px 70px rgba(124,58,237,.45)}
  .free::after{content:"";position:absolute;right:-60px;top:-60px;width:320px;height:320px;border-radius:50%;
    background:rgba(255,255,255,.10)}
  .free>*{position:relative;z-index:1}
  .free .gift{font-size:46px}
  .free h2{font-size:clamp(30px,5vw,46px);font-weight:800;letter-spacing:-1px;margin:6px 0 0}
  .free p.lede{font-size:17px;opacity:.92;max-width:520px;margin:14px auto 0;font-weight:500}
  .claimbox{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);
    border-radius:22px;padding:26px;max-width:480px;margin:28px auto 0}
  .btn-light{background:#fff;color:var(--accent-deep)}
  .btn-light:hover{box-shadow:0 14px 30px rgba(0,0,0,.18)}
  .btn-big{font-size:18px;padding:17px 30px;width:100%;justify-content:center}
  .field{width:100%;padding:14px 16px;border-radius:13px;border:1px solid rgba(255,255,255,.55);
    background:rgba(255,255,255,.96);color:#1a1233;font-size:16px;font-weight:600;outline:none;font-family:inherit}
  .field::placeholder{color:#9a93ad;font-weight:500}
  .optin{display:flex;align-items:flex-start;gap:9px;text-align:left;margin:14px 2px;font-size:13.5px;opacity:.96;cursor:pointer}
  .optin input{margin-top:1px;width:18px;height:18px;accent-color:#fff;flex:0 0 auto}
  .optin span{line-height:1.35}
  .code{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:24px;font-weight:700;letter-spacing:2px;
    background:rgba(0,0,0,.18);border-radius:14px;padding:16px;word-break:break-all;border:1px dashed rgba(255,255,255,.4)}
  .mini{font-size:12.5px;opacity:.8;margin-top:14px}
  .row2{display:flex;gap:10px;margin-top:14px}
  .row2 .btn{flex:1}
  .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
    display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* steps */
  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px;text-align:left}
  .step{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:18px}
  .step .n{width:30px;height:30px;border-radius:50%;background:#fff;color:var(--accent-deep);font-weight:800;
    display:flex;align-items:center;justify-content:center;font-size:15px}
  .step h5{margin:12px 0 0;font-size:15.5px;font-weight:700}
  .step p{margin:5px 0 0;font-size:13px;opacity:.85}
  /* footer */
  footer{border-top:1px solid var(--line);padding:40px 0;color:var(--muted);font-size:14px;margin-top:30px}
  .foot{display:flex;flex-wrap:wrap;gap:18px;align-items:center}
  .foot a{font-weight:600}
  .foot a:hover{color:var(--accent)}
  .legal{margin-top:18px;font-size:12.5px;opacity:.8;max-width:760px}
  /* hero pricing line */
  .hero .priceline{margin-top:16px;color:var(--muted);font-size:14.5px;font-weight:600}
  .hero .priceline b{color:var(--ink)}
  .hero .priceline .freetag{color:var(--accent);font-weight:700}
  .hero .alt{margin-top:10px;font-size:13px;color:var(--muted);font-weight:600}
  .hero .alt a{color:var(--accent);font-weight:700}
  /* pricing */
  .pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px;align-items:stretch}
  .plan{background:#fff;border:1px solid var(--line);border-radius:22px;padding:30px 24px 26px;position:relative;
    display:flex;flex-direction:column;box-shadow:0 8px 26px rgba(11,8,32,.05)}
  .plan.featured{border:2px solid var(--accent);box-shadow:0 18px 46px rgba(124,58,237,.20)}
  .plan .badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;
    font-size:11px;font-weight:800;letter-spacing:.5px;padding:5px 13px;border-radius:999px;white-space:nowrap;
    box-shadow:0 6px 16px rgba(124,58,237,.35)}
  .plan .pname{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .plan .pprice{font-size:40px;font-weight:800;letter-spacing:-1.5px;margin:8px 0 0}
  .plan .pper{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:2px}
  .plan ul{list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:10px;flex:1}
  .plan li{display:flex;gap:9px;font-size:14.5px;font-weight:500;align-items:flex-start;line-height:1.35}
  .plan li svg{flex:0 0 auto;margin-top:2px;color:#34C759}
  .plan.featured li svg{color:var(--accent)}
  .pricing-note{text-align:center;color:var(--muted);font-size:14px;margin:26px auto 0;font-weight:500;max-width:620px;line-height:1.5}
  .pricing-note a{color:var(--accent);font-weight:700}
  .pricing-note .solid{display:block;margin-top:10px}
  /* versions / changelog */
  .versions{max-width:760px;margin:38px auto 0;display:flex;flex-direction:column;gap:16px}
  .ver{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px 24px;
    box-shadow:0 8px 26px rgba(11,8,32,.05);position:relative}
  .ver.current{border:2px solid var(--accent);box-shadow:0 18px 46px rgba(124,58,237,.18)}
  .ver-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ver-num{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .ver-date{font-size:13px;color:var(--muted);font-weight:600}
  .ver-tag{margin-left:auto;background:var(--accent);color:#fff;font-size:11px;font-weight:800;
    letter-spacing:.5px;padding:4px 10px;border-radius:999px}
  .ver-list{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:9px}
  .ver-list li{display:flex;gap:10px;font-size:14.5px;font-weight:500;line-height:1.4;align-items:flex-start}
  .ver-list li svg{flex:0 0 auto;margin-top:2px;color:var(--accent)}
  /* faq */
  .faq{max-width:760px;margin:38px auto 0;display:flex;flex-direction:column;gap:12px}
  .faq-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:2px 20px;
    box-shadow:0 8px 26px rgba(11,8,32,.05)}
  .faq-item summary{cursor:pointer;list-style:none;padding:16px 0;font-size:16.5px;font-weight:700;
    display:flex;align-items:center;justify-content:space-between;gap:12px}
  .faq-item summary::-webkit-details-marker{display:none}
  .faq-item summary::after{content:"+";font-size:24px;font-weight:300;color:var(--accent);line-height:1}
  .faq-item[open] summary::after{content:"\2212"}
  .faq-item p{margin:0 0 18px;color:var(--muted);font-size:15px;font-weight:500;line-height:1.55}
  .faq-item p a{color:var(--accent);font-weight:700}
  /* new badge on gallery panels */
  .panel .newtag{position:absolute;top:16px;right:16px;background:var(--accent);color:#fff;font-size:10px;
    font-weight:800;letter-spacing:.5px;padding:4px 9px;border-radius:999px;z-index:3;
    box-shadow:0 6px 16px rgba(124,58,237,.4)}
  /* nav links */
  .navlink{margin-right:4px}
  @media(max-width:680px){.navlink{display:none}}
  /* a11y */
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important}
    html{scroll-behavior:auto}
  }
  @media(max-width:760px){
    .grid,.steps,.pricing-grid{grid-template-columns:1fr}
    .hero{padding-top:44px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="lib/react.production.min.js"></script>
<script src="lib/react-dom.production.min.js"></script>
<script src="app.js"></script>
</body>
</html>
